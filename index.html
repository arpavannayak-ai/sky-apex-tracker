<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🐺 SKY APEX V5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #e5e5e5; font-family: monospace; padding-top: env(safe-area-inset-top); }
        .tab-btn.active { color: #00ff66; border-bottom: 2px solid #00ff66; font-weight: bold; }
        input, select, textarea { background-color: #111; border: 1px solid #333; color: #fff; }
        input:focus, select:focus, textarea:focus { border-color: #00ff66; outline: none; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen flex flex-col px-4 pb-12">

    <header class="py-4 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-white">🐺 SKY APEX</h1>
            <p class="text-[10px] text-emerald-500 font-bold uppercase tracking-widest">Two-Way Cloud Sync Engaged</p>
        </div>
        <button onclick="fetchSheetHistory()" class="text-[10px] bg-neutral-900 border border-neutral-700 px-2 py-1 rounded hover:bg-neutral-800 text-neutral-400">🔄 SYNC</button>
    </header>

    <nav class="flex border-b border-neutral-800 mb-4 text-xs">
        <button onclick="switchTab('morning')" id="btn-morning" class="tab-btn active flex-1 py-2 text-center">🌅 DAWN</button>
        <button onclick="switchTab('exercise')" id="btn-exercise" class="tab-btn flex-1 py-2 text-center">🏋️‍♂️ LIFT</button>
        <button onclick="switchTab('nutrition')" id="btn-nutrition" class="tab-btn flex-1 py-2 text-center">🍗 FUEL</button>
    </nav>

    <main class="flex-1 overflow-y-auto">
        
        <section id="tab-morning" class="space-y-4">
            <div class="bg-neutral-900 p-4 rounded border border-neutral-800 space-y-4">
                <div class="space-y-2">
                    <label class="block text-xs font-bold text-emerald-400">Anchor Weight (KG)</label>
                    <input type="number" step="0.01" id="m-weight" placeholder="00.00" class="w-full p-2 rounded text-lg font-bold">
                </div>
                <div class="space-y-1">
                    <label class="block text-xs font-bold text-emerald-400 mb-2">Respiratory & Core Protocol</label>
                    <label class="flex items-center gap-2 p-2 bg-black rounded border border-neutral-800"><input type="checkbox" id="m-croc" class="accent-emerald-500 w-4 h-4"><span class="text-xs">3m Crocodile Breath</span></label>
                    <label class="flex items-center gap-2 p-2 bg-black rounded border border-neutral-800"><input type="checkbox" id="m-struct" class="accent-emerald-500 w-4 h-4"><span class="text-xs">15x 90/90 Struct Breath</span></label>
                    <label class="flex items-center gap-2 p-2 bg-black rounded border border-neutral-800"><input type="checkbox" id="m-rib" class="accent-emerald-500 w-4 h-4"><span class="text-xs">10x Lateral Rib Exp</span></label>
                    <label class="flex items-center gap-2 p-2 bg-black rounded border border-neutral-800"><input type="checkbox" id="m-bird" class="accent-emerald-500 w-4 h-4"><span class="text-xs">5x5s Rev Bird Dog</span></label>
                    <label class="flex items-center gap-2 p-2 bg-black rounded border border-neutral-800"><input type="checkbox" id="m-bug" class="accent-emerald-500 w-4 h-4"><span class="text-xs">20s Dead Bug Hold</span></label>
                </div>
                <button onclick="saveMorning()" class="w-full bg-emerald-700 text-black font-black py-3 rounded text-sm uppercase tracking-wider">Transmit Baseline</button>
            </div>
        </section>

        <section id="tab-exercise" class="hidden space-y-4">
            <div id="overload-panel" class="bg-emerald-950/30 border border-emerald-500/30 p-3 rounded text-xs hidden">
                <span class="text-emerald-400 font-bold block mb-1">🎯 PROGRESSIVE OVERLOAD TARGET:</span>
                <p id="target-output" class="text-white font-mono font-bold text-sm">Searching records...</p>
            </div>

            <div class="bg-neutral-900 p-4 rounded border border-neutral-800 space-y-3">
                <div>
                    <label class="block text-xs text-emerald-400 font-bold mb-1">Movement Focus</label>
                    <input type="text" id="e-name" oninput="checkOverloadTarget(this.value)" placeholder="Type exercise name..." class="w-full p-2 rounded text-sm">
                </div>
                <div>
                    <label class="block text-xs text-emerald-400 font-bold mb-1">Today's Performance Metric</label>
                    <input type="text" id="e-metrics" placeholder="e.g. 42.5kg x 8, 8, 8" class="w-full p-2 rounded text-sm font-mono">
                </div>
                <button onclick="saveExercise()" class="w-full bg-emerald-700 text-black font-black py-3 rounded text-sm uppercase tracking-wider">Lock Output Matrix</button>
            </div>
        </section>

        <section id="tab-nutrition" class="hidden space-y-4">
            <div class="grid grid-cols-4 gap-2 bg-neutral-900 p-3 rounded border border-neutral-800 text-center">
                <div class="bg-black p-2 rounded border border-neutral-800"><p class="text-[10px] text-neutral-400">PRO</p><p id="dash-p" class="text-sm font-bold text-emerald-400">0g</p></div>
                <div class="bg-black p-2 rounded border border-neutral-800"><p class="text-[10px] text-neutral-400">CARB</p><p id="dash-c" class="text-sm font-bold text-amber-500">0g</p></div>
                <div class="bg-black p-2 rounded border border-neutral-800"><p class="text-[10px] text-neutral-400">FAT</p><p id="dash-f" class="text-sm font-bold text-red-400">0g</p></div>
                <div class="bg-black p-2 rounded border border-neutral-800"><p class="text-[10px] text-neutral-400">FIBER</p><p id="dash-fi" class="text-sm font-bold text-blue-400">0g</p></div>
            </div>

            <div class="bg-neutral-900 p-4 rounded border border-neutral-800 space-y-3">
                <div>
                    <label class="block text-xs text-emerald-400 font-bold mb-1">Meal / Intake Items</label>
                    <input type="text" id="n-desc" placeholder="e.g. Whey, Eggs, Chicken Breast" class="w-full p-2 rounded text-sm">
                </div>
                <div class="grid grid-cols-4 gap-2">
                    <div><label class="block text-[10px] text-neutral-400 mb-1">Protein</label><input type="number" id="n-p" value="0" class="w-full p-1.5 rounded text-xs text-center font-mono"></div>
                    <div><label class="block text-[10px] text-neutral-400 mb-1">Carbs</label><input type="number" id="n-c" value="0" class="w-full p-1.5 rounded text-xs text-center font-mono"></div>
                    <div><label class="block text-[10px] text-neutral-400 mb-1">Fats</label><input type="number" id="n-f" value="0" class="w-full p-1.5 rounded text-xs text-center font-mono"></div>
                    <div><label class="block text-[10px] text-neutral-400 mb-1">Fiber</label><input type="number" id="n-fi" value="0" class="w-full p-1.5 rounded text-xs text-center font-mono"></div>
                </div>
                <button onclick="saveNutrition()" class="w-full bg-emerald-700 text-black font-black py-3 rounded text-sm uppercase tracking-wider">Log Macro Stream</button>
            </div>
        </section>
    </main>

    <script>
        // CORE CONFIGURATION LINK TO GOOGLE SHEETS API
        const SHEETS_API_URL = "https://script.google.com/macros/s/AKfycbzZFDVjxNTZ6SOPx7Y2hpIw9xAxQN2uaIgkTTtXrEIPfMfgozWtl5GF5giweWE96ZyMCQ/exec";

        let exerciseHistory = [];
        let dailyMacros = { protein: 0, carbs: 0, fats: 0, fiber: 0 };

        function switchTab(tab) {
            ['morning', 'exercise', 'nutrition'].forEach(t => {
                document.getElementById('tab-' + t).classList.add('hidden');
                document.getElementById('btn-' + t).classList.remove('active');
            });
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.getElementById('btn-' + tab).classList.add('active');
        }

        // Pull previous metrics history from Google Sheets
        async function fetchSheetHistory() {
            try {
                let response = await fetch(SHEETS_API_URL);
                exerciseHistory = await response.json();
                console.log("Database history pulled successfully.", exerciseHistory);
            } catch (err) {
                console.error("History sync blackout.", err);
            }
        }

        // Real-time lookup for progressive overload matching
        function checkOverloadTarget(inputName) {
            const panel = document.getElementById('overload-panel');
            const output = document.getElementById('target-output');
            if(!inputName.trim()) { panel.classList.add('hidden'); return; }

            // Find the most recent matching record in database array
            let match = exerciseHistory.find(item => item.name.toLowerCase().trim() === inputName.toLowerCase().trim());
            
            panel.classList.remove('hidden');
            if(match) {
                output.innerText = `LAST SESSION: ${match.metrics}`;
                output.className = "text-emerald-400 font-mono font-bold text-sm animate-pulse";
            } else {
                output.innerText = "NO PREVIOUS MATRIX DATA FOUND. BASELINE SESSION.";
                output.className = "text-neutral-500 font-mono text-xs";
            }
        }

        async function transmitToCloud(payload) {
            try {
                await fetch(SHEETS_API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                alert("🔱 Metrics successfully written into Cloud Registry.");
                fetchSheetHistory(); // Refresh background target pool
            } catch(e) {
                alert("Data loss averted. Link interrupted.");
            }
        }

        function saveMorning() {
            const w = document.getElementById('m-weight').value;
            if(!w) return alert("Weight verification required.");
            transmitToCloud({
                type: "morning",
                date: new Date().toLocaleDateString(),
                weight: w,
                croc: document.getElementById('m-croc').checked ? "YES":"NO",
                struct: document.getElementById('m-struct').checked ? "YES":"NO",
                rib: document.getElementById('m-rib').checked ? "YES":"NO",
                bird: document.getElementById('m-bird').checked ? "YES":"NO",
                bug: document.getElementById('m-bug').checked ? "YES":"NO",
                hold: document.getElementById('m-hold').checked ? "YES":"NO"
            });
        }

        function saveExercise() {
            const n = document.getElementById('e-name').value;
            const m = document.getElementById('e-metrics').value;
            if(!n || !m) return alert("Inputs missing.");
            transmitToCloud({
                type: "exercise",
                timestamp: new Date().toLocaleString(),
                name: n,
                metrics: m,
                notes: "PWA Uplink Entry"
            });
            document.getElementById('e-name').value = '';
            document.getElementById('e-metrics').value = '';
            document.getElementById('overload-panel').classList.add('hidden');
        }

        function saveNutrition() {
            const desc = document.getElementById('n-desc').value;
            const p = parseInt(document.getElementById('n-p').value) || 0;
            const c = parseInt(document.getElementById('n-c').value) || 0;
            const f = parseInt(document.getElementById('n-f').value) || 0;
            const fi = parseInt(document.getElementById('n-fi').value) || 0;

            if(!desc) return alert("Item description required.");

            // Update local daily total dashboard
            dailyMacros.protein += p;
            dailyMacros.carbs += c;
            dailyMacros.fats += f;
            dailyMacros.fiber += fi;

            document.getElementById('dash-p').innerText = dailyMacros.protein + 'g';
            document.getElementById('dash-c').innerText = dailyMacros.carbs + 'g';
            document.getElementById('dash-f').innerText = dailyMacros.fats + 'g';
            document.getElementById('dash-fi').innerText = dailyMacros.fiber + 'g';

            transmitToCloud({
                type: "nutrition",
                timestamp: new Date().toLocaleString(),
                desc: desc,
                protein: p,
                carbs: c,
                fats: f,
                fiber: fi
            });

            document.getElementById('n-desc').value = '';
            document.getElementById('n-p').value = 0;
            document.getElementById('n-c').value = 0;
            document.getElementById('n-f').value = 0;
            document.getElementById('n-fi').value = 0;
        }

        // Hydrate background system memory immediately on load
        fetchSheetHistory();
    </script>
</body>
</html>
