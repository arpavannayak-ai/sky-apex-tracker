<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>SKY APEX MASTER COMMAND V23</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #e5e5e5; font-family: monospace; padding-top: env(safe-area-inset-top); }
        .tab-btn.active { color: #00ff66; border-bottom: 2px solid #00ff66; font-weight: bold; }
        .day-btn.active { background-color: #00ff66; color: #000; font-weight: bold; border-color: #00ff66; }
        input, select, textarea { background-color: #111; border: 1px solid #333; color: #fff; }
        input:focus, select:focus, textarea:focus { border-color: #00ff66; outline: none; }
        input:disabled { background-color: #0c1912; border-color: #042f1a; color: #00ff66; font-weight: bold; opacity: 1; cursor: not-allowed; }
        ::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; }
        ::-webkit-scrollbar { display: none; }
        
        .task-btn { background-color: #000; border: 1px solid #333; color: #a3a3a3; transition: all 0.2s; }
        .task-btn.selected { background-color: rgba(6, 78, 59, 0.4); border-color: #00ff66; color: #00ff66; font-weight: bold; }
        .task-btn.locked { background-color: #064e3b; border-color: #00ff66; color: #00ff66; font-weight: bold; opacity: 1; cursor: not-allowed; }
        .task-btn.skipped { opacity: 0.25; cursor: not-allowed; text-decoration: line-through; background-color: #111; border-color: #222; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen flex flex-col px-4 pb-12">

    <header class="py-4 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-white">🐺 SKY APEX</h1>
            <p id="sync-status" class="text-[10px] text-emerald-500 font-bold uppercase tracking-widest">Awaiting Sync...</p>
        </div>
        <button onclick="fetchCloudData()" class="text-[10px] bg-neutral-900 border border-neutral-700 px-2 py-1 rounded hover:bg-neutral-800 text-neutral-400">🔄 SYNC</button>
    </header>

    <nav class="flex border-b border-neutral-800 mb-4 text-[10px] font-bold tracking-wider">
        <button onclick="switchTab('daily')" id="btn-daily" class="tab-btn active flex-1 py-2 text-center">DAILY</button>
        <button onclick="switchTab('exercise')" id="btn-exercise" class="tab-btn flex-1 py-2 text-center">LIFT</button>
        <button onclick="switchTab('nutrition')" id="btn-nutrition" class="tab-btn flex-1 py-2 text-center">FUEL</button>
        <button onclick="switchTab('summary')" id="btn-summary" class="tab-btn flex-1 py-2 text-center">DATA</button>
    </nav>

    <div class="flex gap-2 overflow-x-auto pb-4 mb-2 border-b border-neutral-800" id="date-nav"></div>

    <main class="flex-1 overflow-y-auto">
        
        <section id="tab-daily" class="space-y-4">
            <div class="bg-neutral-900 p-4 rounded border border-neutral-800 space-y-3">
                <h3 class="text-[10px] text-neutral-500 uppercase tracking-widest border-b border-neutral-800 pb-1">Morning Anchor</h3>
                <div class="flex gap-2 items-center">
                    <input type="number" step="0.1" id="daily-weight" placeholder="Weight (KG)" class="w-full p-3 rounded text-lg text-center font-bold font-mono bg-black text-white border border-neutral-800">
                    <button id="btn-save-weight" onclick="saveWeightOnly()" class="bg-neutral-800 text-white font-bold py-3 px-4 rounded text-xs uppercase border border-neutral-700">Save</button>
                </div>
            </div>

            <div class="bg-neutral-900 p-4 rounded border border-neutral-800 space-y-3" id="protocol-container">
                <h3 class="text-[10px] text-neutral-500 uppercase tracking-widest border-b border-neutral-800 pb-1">Respiratory Protocol</h3>
                <button id="t-croc" onclick="toggleTask(this)" class="task-btn w-full p-3 rounded text-xs text-left" data-field="croc" data-task="Crocodile Breath">Crocodile Breath</button>
                <button id="t-9090" onclick="toggleTask(this)" class="task-btn w-full p-3 rounded text-xs text-left" data-field="b9090" data-task="90-90 Breathing">90-90 Breathing</button>
                <button id="t-rib" onclick="toggleTask(this)" class="task-btn w-full p-3 rounded text-xs text-left" data-field="rib" data-task="Lateral Rib Exp">Lateral Rib Expansion</button>
                
                <h3 class="text-[10px] text-neutral-500 uppercase tracking-widest border-b border-neutral-800 pb-1 mt-4">Core Activation</h3>
                <button id="t-bug" onclick="toggleTask(this)" class="task-btn w-full p-3 rounded text-xs text-left" data-field="bug" data-task="Dead Bug (20s)">Dead Bug (20 sec)</button>
                <button id="t-bird" onclick="toggleTask(this)" class="task-btn w-full p-3 rounded text-xs text-left" data-field="bird" data-task="Rev Bird Dog (5s)">Reverse Bird Dog (5s Hold)</button>
                <button id="t-plank" onclick="toggleTask(this)" class="task-btn w-full p-3 rounded text-xs text-left" data-field="plank" data-task="Single Plank (5s)">Single Arm/Leg Plank (5s Hold)</button>

                <button id="btn-lock-daily" onclick="lockDailyProtocol()" class="w-full bg-emerald-700 hover:bg-emerald-600 text-black font-black py-3 rounded text-sm uppercase tracking-wider mt-4">Lock Daily Protocol</button>
            </div>
        </section>

        <section id="tab-exercise" class="hidden space-y-4">
            <div id="workout-container" class="space-y-3"></div>
            
            <div class="bg-neutral-950 p-4 rounded border border-neutral-800 border-dashed space-y-2 mt-6">
                <p class="text-[10px] text-neutral-500 uppercase">Off-Program Manual Entry</p>
                <input type="text" id="manual-name" placeholder="Exercise Name" class="w-full p-2 rounded text-xs">
                <div class="flex gap-2">
                    <input type="text" id="manual-weight" placeholder="Wgt" class="flex-1 p-2 rounded text-xs text-center font-mono">
                    <input type="text" id="manual-reps" placeholder="Reps/Time" class="flex-1 p-2 rounded text-xs text-center font-mono">
                    <input type="number" step="0.5" id="manual-rpe" placeholder="RPE" class="flex-1 p-2 rounded text-xs text-center font-mono">
                </div>
                <button onclick="saveManualExercise()" class="w-full bg-neutral-800 text-white font-bold py-2 rounded text-xs uppercase">Log Manual</button>
            </div>
        </section>

        <section id="tab-nutrition" class="hidden space-y-4">
            <div class="bg-neutral-900 p-4 rounded border border-neutral-800 space-y-3">
                <div class="flex justify-between items-center">
                    <h3 class="text-xs font-bold text-blue-400 tracking-widest uppercase">Hydration Input</h3>
                    <span id="water-total-banner" class="text-xs font-black text-white bg-blue-950 border border-blue-800 px-2 py-0.5 rounded font-mono">0 / 6000 mL</span>
                </div>
                <button onclick="addWaterVolume(500)" class="w-full bg-blue-600 hover:bg-blue-500 text-black font-black py-4 rounded text-sm uppercase tracking-widest transition">+ 500mL Water</button>
            </div>

            <div class="bg-neutral-900 p-4 rounded border border-neutral-800 space-y-3">
                <h3 class="text-xs font-bold text-emerald-400 tracking-widest uppercase">Log Intake Block</h3>
                <div class="flex gap-2">
                    <input type="time" id="n-time" class="p-2 rounded text-xs font-mono bg-black text-emerald-400 border border-neutral-800 w-1/3">
                    <input type="text" id="n-desc" placeholder="e.g. 250g Chicken, 150g Rice" class="flex-1 p-2 rounded text-sm font-mono bg-black text-white border border-neutral-800">
                </div>
                <button onclick="saveNutrition()" class="w-full bg-emerald-700 hover:bg-emerald-600 text-black font-black py-3 rounded text-sm uppercase tracking-wider transition">+ Log Meal</button>
            </div>

            <div class="space-y-2 mt-4">
                <h4 class="text-[10px] font-bold text-neutral-500 uppercase border-b border-neutral-800 pb-1">Fuel Logged for Selected Date</h4>
                <div id="nutrition-container" class="space-y-2"></div>
            </div>
        </section>

        <section id="tab-summary" class="hidden space-y-4">
            <h2 class="text-xs font-bold text-neutral-400 uppercase tracking-widest border-b border-neutral-800 pb-2">Weekly Performance Dashboard</h2>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-neutral-900 p-4 rounded border border-neutral-800 text-center flex flex-col justify-center">
                    <p class="text-[10px] text-neutral-500 uppercase">Workouts Logged</p>
                    <p id="sum-workouts" class="text-2xl font-black text-white">--</p>
                </div>
                <div class="bg-neutral-900 p-4 rounded border border-neutral-800 text-center flex flex-col justify-center">
                    <p class="text-[10px] text-neutral-500 uppercase">Avg Daily Protein</p>
                    <p id="sum-protein" class="text-2xl font-black text-emerald-400">-- g</p>
                </div>
            </div>

            <div class="p-4 bg-emerald-950/20 border border-emerald-500/30 rounded text-center space-y-3">
                <button onclick="copyDataForWolf()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-black font-bold py-3 rounded text-xs uppercase tracking-widest transition">Copy Daily Dump</button>
                <div class="border-t border-emerald-900 pt-3">
                    <textarea id="ai-paste" rows="4" placeholder="Paste feedback here..." class="w-full p-2 rounded text-xs mb-2 resize-none font-mono bg-black text-white border border-neutral-800"></textarea>
                    <textarea id="ai-paste" rows="4" placeholder="Paste feedback here..." class="w-full p-2 rounded text-xs mb-2 resize-none font-mono bg-black text-white border border-neutral-800"></textarea>
                    <button onclick="saveAIAssessment()" class="w-full bg-emerald-900/50 hover:bg-emerald-900 text-emerald-400 font-bold py-2 rounded text-[10px] uppercase border border-emerald-700">Lock Assessment to Database</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        // PASTE YOUR APPS SCRIPT URL HERE
        const SHEETS_API_URL = "https://script.google.com/macros/s/AKfycbxsiyNPT-iGN9cLpFjp6p_NOWTi-P6EN8BaqHocYknx0tvfTmsDQZx42Vp56GqrDr6Okw/exec";

        let cloudData = { program: [], history: [], nutrition: [], daily: [] };
        let activeDateIso = ""; 

        function getIsoString(dateObj) {
            return dateObj.getFullYear() + "-" + ("0" + (dateObj.getMonth() + 1)).slice(-2) + "-" + ("0" + dateObj.getDate()).slice(-2);
        }

        function setCurrentTime() {
            const now = new Date();
            document.getElementById('n-time').value = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        }

        function buildDateNav() {
            const nav = document.getElementById('date-nav'); nav.innerHTML = ''; const today = new Date();
            for(let i = -2; i <= 4; i++) {
                let t = new Date(); t.setDate(today.getDate() + i);
                let isoStr = getIsoString(t);
                let dName = t.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase(); let dNum = t.getDate();
                let c = (i === 0) ? "day-btn active min-w-[60px] py-2 rounded bg-emerald-600 text-black border border-emerald-500 flex flex-col items-center justify-center" : "day-btn min-w-[60px] py-2 rounded bg-neutral-900 border border-neutral-800 text-neutral-400 flex flex-col items-center justify-center";
                nav.innerHTML += `<button onclick="setDate('${isoStr}', this)" class="${c}"><span class="text-[9px] font-bold">${dName}</span><span class="text-sm font-black">${dNum}</span></button>`;
            }
            activeDateIso = getIsoString(today);
        }

        function setDate(isoStr, btn) {
            activeDateIso = isoStr;
            document.querySelectorAll('.day-btn').forEach(b => b.className = "day-btn min-w-[60px] py-2 rounded bg-neutral-900 border border-neutral-800 text-neutral-400 flex flex-col items-center justify-center");
            btn.className = "day-btn active min-w-[60px] py-2 rounded bg-emerald-600 text-black border border-emerald-500 flex flex-col items-center justify-center";
            renderAllData();
        }

        function switchTab(tab) {
            ['daily', 'exercise', 'nutrition', 'summary'].forEach(t => { document.getElementById('tab-' + t).classList.add('hidden'); document.getElementById('btn-' + t).classList.remove('active'); });
            document.getElementById('tab-' + tab).classList.remove('hidden'); document.getElementById('btn-' + tab).classList.add('active');
            if(tab === 'nutrition') setCurrentTime();
            if(tab === 'summary') computeSummary();
        }

        async function fetchCloudData() {
            document.getElementById('sync-status').innerText = "DOWNLOADING...";
            try {
                let res = await fetch(SHEETS_API_URL); cloudData = await res.json();
                document.getElementById('sync-status').innerText = "SYNCED: " + new Date().toLocaleTimeString();
                mergeCloudIntoLocal();
                renderAllData();
            } catch(e) { document.getElementById('sync-status').innerText = "OFFLINE"; }
        }

        function mergeCloudIntoLocal() {
            if(!cloudData.daily) return;
            cloudData.daily.forEach(record => {
                localStorage.setItem(`daily_record_${record.date}`, JSON.stringify(record));
            });
        }

        function getLocalOrCloudRecord(dateIso) {
            let local = localStorage.getItem(`daily_record_${dateIso}`);
            if(local) return JSON.parse(local);
            if(cloudData.daily) {
                let cloudMatch = cloudData.daily.find(d => d.date === dateIso);
                if(cloudMatch) return cloudMatch;
            }
            return { date: dateIso, weight: "", water: 0, croc: "", b9090: "", rib: "", bug: "", bird: "", plank: "" };
        }

        function saveLocalRecord(record) {
            localStorage.setItem(`daily_record_${record.date}`, JSON.stringify(record));
            if(!cloudData.daily) cloudData.daily = [];
            let idx = cloudData.daily.findIndex(d => d.date === record.date);
            if(idx !== -1) cloudData.daily[idx] = record;
            else cloudData.daily.push(record);
        }

        // ---- DAILY TAB ----
        function renderDailyMetrics() {
            let dayRecord = getLocalOrCloudRecord(activeDateIso);
            let wInput = document.getElementById('daily-weight');
            let wBtn = document.getElementById('btn-save-weight');
            
            if(dayRecord && dayRecord.weight) {
                wInput.value = dayRecord.weight; wInput.disabled = true; wBtn.style.display = 'none';
                wInput.className = "w-full p-3 rounded text-lg text-center font-bold font-mono bg-emerald-950/30 text-emerald-400 border border-emerald-900";
            } else {
                wInput.value = ''; wInput.disabled = false; wBtn.style.display = 'block';
                wInput.className = "w-full p-3 rounded text-lg text-center font-bold font-mono bg-black text-white border border-neutral-800";
            }

            let fields = ['croc', 'b9090', 'rib', 'bug', 'bird', 'plank'];
            let hasAnyLocked = fields.some(f => dayRecord && dayRecord[f] === "LOCKED");

            fields.forEach(f => {
                let btn = document.querySelector(`[data-field="${f}"]`);
                let tName = btn.getAttribute('data-task');
                btn.classList.remove('selected', 'locked', 'skipped');
                
                if (dayRecord && dayRecord[f] === "LOCKED") {
                    btn.classList.add('locked'); btn.innerText = `✔️ ${tName}`;
                } else if (hasAnyLocked) {
                    btn.classList.add('skipped'); btn.innerText = `❌ ${tName}`;
                } else {
                    btn.innerText = tName;
                }
            });

            document.getElementById('btn-lock-daily').style.display = hasAnyLocked ? 'none' : 'block';
            document.getElementById('water-total-banner').innerText = `${dayRecord ? dayRecord.water : 0} / 6000 mL`;
        }

        function toggleTask(btn) {
            if (btn.classList.contains('locked') || btn.classList.contains('skipped')) return;
            btn.classList.toggle('selected');
        }

        function saveWeightOnly() {
            let weightVal = document.getElementById('daily-weight').value;
            if(!weightVal) return;
            let record = getLocalOrCloudRecord(activeDateIso);
            record.weight = weightVal;
            saveLocalRecord(record);
            renderDailyMetrics();
            transmit({ type: "daily_update", date: activeDateIso, weight: weightVal });
        }

        function lockDailyProtocol() {
            let record = getLocalOrCloudRecord(activeDateIso);
            let updatePayload = { type: "daily_update", date: activeDateIso };

            document.querySelectorAll('#protocol-container .task-btn').forEach(btn => {
                let field = btn.getAttribute('data-field');
                if(btn.classList.contains('selected')) {
                    record[field] = "LOCKED"; updatePayload[field] = "LOCKED";
                } else {
                    record[field] = "SKIPPED"; updatePayload[field] = "SKIPPED";
                }
            });

            saveLocalRecord(record);
            renderDailyMetrics();
            transmit(updatePayload);
        }

        function addWaterVolume(vol) {
            let record = getLocalOrCloudRecord(activeDateIso);
            record.water = parseInt(record.water || 0) + vol;
            saveLocalRecord(record);
            renderDailyMetrics();
            transmit({ type: "daily_update", date: activeDateIso, water: record.water });
        }

        // ---- EXERCISE TAB: PERSISTENT INLINE MUTATION CORE ----
        function renderWorkoutProgram() {
            const container = document.getElementById('workout-container'); container.innerHTML = '';
            let todaysLifts = cloudData.program ? cloudData.program.filter(p => p.date === activeDateIso) : [];
            if(todaysLifts.length === 0) return container.innerHTML = `<p class="text-xs text-neutral-500 text-center italic mt-4">Rest Day or Unprogrammed.</p>`;

            todaysLifts.forEach((lift, exIndex) => {
                let pastMatch = cloudData.history ? cloudData.history.find(h => h.name.toLowerCase() === lift.name.toLowerCase()) : null;
                let pastText = pastMatch ? `LAST: ${pastMatch.metrics}` : "NO HISTORY";

                // Count how many sets are physically locked into device storage for this specific movement
                let localSetCount = 0;
                let rowsHTML = '';
                
                while (localStorage.getItem(`lift_lock_${activeDateIso}_${lift.name}_${localSetCount}`)) {
                    let cachedData = JSON.parse(localStorage.getItem(`lift_lock_${activeDateIso}_${lift.name}_${localSetCount}`));
                    rowsHTML += generateLockedSetRow(exIndex, localSetCount, cachedData.w, cachedData.r, cachedData.rpe);
                    localSetCount++;
